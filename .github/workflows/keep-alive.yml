# Evita que Render (plan free) duerma el servicio por inactividad.
# GitHub → repo → Settings → Secrets and variables → Actions → PULSAR_URL
# Valor: https://pulsar-xxxx.onrender.com (sin barra final)

name: Keep Pulsar alive

on:
  schedule:
    - cron: "*/14 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /login
        env:
          PULSAR_URL: ${{ secrets.PULSAR_URL }}
        run: |
          if [ -z "$PULSAR_URL" ]; then
            echo "Configura el secret PULSAR_URL para activar keep-alive."
            exit 0
          fi
          curl -fsS -o /dev/null -w "HTTP %{http_code}\n" "${PULSAR_URL}/login"
