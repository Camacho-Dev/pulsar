# Verifica build en cada push (como impostor-dominicano, pero sin GitHub Pages: Pulsar es servidor Node)
name: CI Pulsar

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate
        env:
          DATABASE_URL: file:./prisma/ci.db

      - name: Tests
        run: npm test
        env:
          DATABASE_URL: file:./prisma/ci.db

      - name: Build Next.js
        run: npm run build
        env:
          DATABASE_URL: file:./prisma/ci.db
          AUTH_SECRET: ci-secret-min-32-chars-long-for-build
          AUTH_URL: http://localhost:3000
          NEXT_PUBLIC_APP_URL: http://localhost:3000
